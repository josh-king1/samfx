<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Voting Results</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #0a7d2c;
            --secondary: #f4f9f6;
        }

        /* Background */
        body {
            background: var(--secondary);
            font-family: Arial, sans-serif;
        }

        /* Header */
        .header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .navbar-custom {
            background-color: #198754;
        }

        /* Section title */
        .section-title {
            color: var(--primary);
            font-weight: bold;
            margin: 40px 0 25px 0;
        }

        /* Card */
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
        }

        .result-card:hover {
            transform: translateY(-6px);
        }

        /* Circle */
        .circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            position: relative;
        }

        .circle::before {
            content: "";
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            position: absolute;
        }

        .circle span {
            position: relative;
            font-size: 30px;
            font-weight: bold;
            color: var(--primary);
        }

        /* Candidate text */
        .candidate-name {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        .vote-count {
            font-size: 14px;
            color: gray;
        }

        /* Footer */
        footer {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
            background: var(--primary);
            color: white;
        }
    </style>
</head>

<body>
    <!-- NAVIGATION BAR -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">NACOS | Computer Science</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashborad.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="vote.html">Vote</a>
                    </li>
               
                <li class="nav-item">
                    <a class="nav-link active" href="result.html">Results</a>
                </li>
                 </ul>
                <ul class="navbar-nav">
                    <li>
                        <a class="nav-link text-warning" href="logout.html">
                            <i class="fa-solid fa-right-from-bracket me-1"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">

        <!-- PRESIDENT -->
        <h4 class="section-title">President</h4>

        <div class="row text-center">

            <div class="col-md-6 mb-4">
                <div class="result-card">

                    <div class="circle" style="background: conic-gradient(var(--primary) 0% 70%, #e0e0e0 70% 100%);">
                        <span>70%</span>
                    </div>

                    <div class="candidate-name">John Doe</div>
                    <div class="vote-count">350 Votes</div>

                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="result-card">

                    <div class="circle" style="background: conic-gradient(var(--primary) 0% 30%, #e0e0e0 30% 100%);">
                        <span>30%</span>
                    </div>

                    <div class="candidate-name">Mary Smith</div>
                    <div class="vote-count">150 Votes</div>

                </div>
            </div>

        </div>

        <!-- SECRETARY -->
        <h4 class="section-title">Secretary General</h4>

        <div class="row text-center">

            <div class="col-md-6 mb-4">
                <div class="result-card">

                    <div class="circle" style="background: conic-gradient(var(--primary) 0% 55%, #e0e0e0 55% 100%);">
                        <span>55%</span>
                    </div>

                    <div class="candidate-name">David Paul</div>
                    <div class="vote-count">220 Votes</div>

                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="result-card">

                    <div class="circle" style="background: conic-gradient(var(--primary) 0% 45%, #e0e0e0 45% 100%);">
                        <span>45%</span>
                    </div>

                    <div class="candidate-name">Grace Lee</div>
                    <div class="vote-count">180 Votes</div>

                </div>
            </div>

        </div>

    </div>

    <footer>
        &copy; 2026 NACOS Computer Science | Election Result System
    </footer>

</body>

</html>

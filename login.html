<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login - NACOS</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --primary: #0a7d2c;
    --secondary: #f4f9f6;
}

body {
    background: var(--secondary);
    font-family: Arial, sans-serif;
}

.login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-box {
    background: white;
    border-radius: 20px;
    padding: 40px 30px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.login-box:hover {
    transform: translateY(-5px);
}

.login-box h2 {
    color: var(--primary);
    margin-bottom: 30px;
    font-weight: bold;
}

.form-control {
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 20px;
}

.btn-login {
    background: var(--primary);
    color: white;
    border-radius: 12px;
    padding: 12px 0;
    font-size: 18px;
    width: 100%;
    transition: 0.3s;
}

.btn-login:hover {
    background: #075a1d;
}

.footer-text {
    margin-top: 20px;
    font-size: 14px;
    color: gray;
}
</style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom navbar-dark sticky-top">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand logo-text" href="#">
                NACOS | Computer Science
            </a>
        </div>  
    </nav>
<div class="login-container">
    <div class="login-box">
        <h2>Student Login</h2>
        <form action="dashboard.html" method="post">
            <input type="text" class="form-control" placeholder="Matriculation Number" required>
            <input type="password" class="form-control" placeholder="Student ID" required>
            <button type="submit" class="btn btn-login">Login</button>
        </form>
        <p class="footer-text">Students Only | NACOS Election System</p>
    </div>
</div>

</body>
</html>

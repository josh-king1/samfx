<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Candidate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background-color: #f4f9f6;
        }

             /* Sidebar */
        .sidebar {
            height: 100vh;
            background-color: #198754;
            padding-top: 20px;
            position: fixed;
            width: 240px;
        }

        .sidebar a {
            color: white;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .sidebar .active {
            background-color: rgba(255, 255, 255, 0.3);
        }
        .admin-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .admin-title {
            background-color: #198754;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
        }

        .submit-btn {
            padding: 10px 35px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
   <div class="sidebar">
        <h4 class="text-white text-center mb-4">NACOS Admin</h4>

        <a href="dashborad.html" class="">
            <i class="fa-solid fa-gauge me-2"></i> Dashboard
        </a>

        <a href="form.html" class="active">
            <i class="fa-solid fa-user-plus me-2"></i> Add Candidate
        </a>

        <a href="result.html">
            <i class="fa-solid fa-chart-column me-2"></i> View Results
        </a>

        <!-- <a href="#">
            <i class="fa-solid fa-users me-2"></i> Manage Voters
        </a> -->

        <a href="../logout.html">
            <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
        </a>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="admin-box">

                    <div class="admin-title">
                        <h4>Add Candidate</h4>
                    </div>

                    <form action="admin-success.html">

                        <!-- Name -->
                        <div class="mb-3">
                            <label class="form-label">Candidate Name</label>
                            <input type="text" class="form-control" placeholder="Enter full name" required>
                        </div>

                        <!-- Level -->
                        <div class="mb-3">
                            <label class="form-label">Level</label>
                            <select class="form-select" required>
                                <option value="">Select Level</option>
                                <option>100 Level</option>
                                <option>200 Level</option>
                                <option>300 Level</option>
                                <option>400 Level</option>
                            </select>
                        </div>

                        <!-- Position -->
                        <div class="mb-4">
                            <label class="form-label">Position</label>
                            <select class="form-select" required>
                                <option value="">Select Position</option>
                                <option>Financial Secretary</option>
                                <option>Secretary General</option>
                                <option>President</option>
                                <option>Vice President</option>
                                <option>Treasurer</option>
                            </select>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-success submit-btn">
                                Add Candidate
                            </button>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>

    <footer class="py-4 text-center" style="background:#198754; color:white;">
        <p class="mb-0">
            &copy; 2026 NACOS Computer Science. All rights reserved.
        </p>
    </footer>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background-color: #f4f9f6;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background-color: #198754;
            padding-top: 20px;
            position: fixed;
            width: 240px;
        }

        .sidebar a {
            color: white;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .sidebar .active {
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* Main Content */
        .main-content {
            margin-left: 240px;
            padding: 30px;
        }

        /* Cards */
        .dashboard-card {
            border-radius: 15px;
            padding: 25px;
            color: white;
            transition: 0.3s;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
        }

        .card-green {
            background-color: #198754;
        }

        .card-blue {
            background-color: #0d6efd;
        }

        .card-orange {
            background-color: #fd7e14;
        }

        .card-red {
            background-color: #dc3545;
        }

        .quick-btn {
            padding: 12px 30px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4 class="text-white text-center mb-4">NACOS Admin</h4>

        <a href="#" class="active">
            <i class="fa-solid fa-gauge me-2"></i> Dashboard
        </a>

        <a href="form.html">
            <i class="fa-solid fa-user-plus me-2"></i> Add Candidate
        </a>

        <a href="result.html">
            <i class="fa-solid fa-chart-column me-2"></i> View Results
        </a>
<!-- 
        <a href="#">
            <i class="fa-solid fa-users me-2"></i> Manage Voters
        </a> -->

        <a href="../logout.html">
            <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
        </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <h2 class="mb-4">Admin Dashboard</h2>

        <!-- STATISTICS CARDS -->
        <div class="row g-4 mb-5">

            <div class="col-md-3">
                <div class="dashboard-card card-green text-center">
                    <i class="fa-solid fa-users fa-2x mb-2"></i>
                    <h4>250</h4>
                    <p>Total Voters</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="dashboard-card card-blue text-center">
                    <i class="fa-solid fa-user-tie fa-2x mb-2"></i>
                    <h4>12</h4>
                    <p>Total Candidates</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="dashboard-card card-orange text-center">
                    <i class="fa-solid fa-check-circle fa-2x mb-2"></i>
                    <h4>180</h4>
                    <p>Total Votes Cast</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="dashboard-card card-red text-center">
                    <i class="fa-solid fa-clock fa-2x mb-2"></i>
                    <h4>Voting Open</h4>
                    <p>Status</p>
                </div>
            </div>

        </div>

        <!-- QUICK ACTIONS -->
        <div class="card p-4 shadow-sm rounded-4">
            <h5 class="mb-4">Quick Actions</h5>

            <a href="form.html" class="btn btn-success quick-btn me-3">
                <i class="fa-solid fa-user-plus me-1"></i> Add Candidate
            </a>

            <a href="result.html" class="btn btn-primary quick-btn me-3">
                <i class="fa-solid fa-chart-column me-1"></i> View Results
            </a>

            <a href="#" class="btn btn-warning quick-btn">
                <i class="fa-solid fa-users me-1"></i> Manage Voters
            </a>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

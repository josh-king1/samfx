<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NACOS Student Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #0a7d2c;
            --secondary: #f4f9f6;
        }

        body {
            background: var(--secondary);
            font-family: Arial, sans-serif;
        }

        /* Center the login card */
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Login Card */
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            transition: 0.3s;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        /* Header */
        .login-card h2 {
            color: var(--primary);
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Inputs */
        .form-control {
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
        }

        /* Submit Button */
        .btn-login {
            background: var(--primary);
            color: white;
            font-weight: bold;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #06611a;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom navbar-dark sticky-top">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand logo-text" href="#">
                NACOS | Computer Science
            </a>
        </div>  
    </nav>
    <div class="login-container">
        <div class="login-card">

            <h2>Student Login</h2>

            <form action="#">

                <!-- Full Name -->
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your full name" required>
                </div>

                <!-- Matric Number -->
                <div class="mb-3">
                    <label class="form-label">Matric Number</label>
                    <input type="text" class="form-control" placeholder="Enter your matric number" required>
                </div>

                <!-- Student ID -->
                <div class="mb-3">
                    <label class="form-label">Student ID</label>
                    <input type="text" class="form-control" placeholder="Enter your student ID" required>
                </div>

                <!-- Phone Number -->
                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" placeholder="Enter your phone number" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <!-- Submit -->
                <div class="mt-4">
                    <button type="submit" class="btn btn-login">Register</button>
                </div>

            </form>

        </div>
    </div>

</body>

</html>
